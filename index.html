<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق القرآن الكريم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal:wght@400;700&display=swap');
        
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f8fafc;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }

        .quran-text {
            font-family: 'Amiri', serif;
        }

        /* حماية إضافية */
        img, a, button {
            -webkit-user-drag: none;
        }

        /* تأثيرات لظهور واجهة انقطاع الانترنت */
        #offlineOverlay {
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-32" oncontextmenu="return false;">

    <!-- واجهة انقطاع الإنترنت (مخفية افتراضياً) -->
    <div id="offlineOverlay" class="fixed inset-0 z-[100] bg-white/90 flex flex-col items-center justify-center p-6 text-center hidden">
        <div class="bg-emerald-50 w-32 h-32 rounded-full flex items-center justify-center mb-6 shadow-inner">
            <i class="fas fa-wifi-slash text-5xl text-emerald-600"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-800 mb-2">عذراً، لا يوجد اتصال بالإنترنت</h2>
        <p class="text-gray-600 mb-8 max-w-xs">يرجى التأكد من اتصالك بالشبكة لتتمكن من تصفح السور والاستماع إلى التلاوات</p>
        <button onclick="window.location.reload()" class="bg-emerald-600 text-white px-8 py-3 rounded-full font-bold shadow-lg hover:bg-emerald-700 transition-all flex items-center gap-2">
            <i class="fas fa-sync-alt"></i>
            إعادة المحاولة
        </button>
    </div>

    <!-- الهيدر -->
    <header class="bg-emerald-700 text-white p-6 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <i class="fas fa-quran"></i>
                القرآن الكريم
            </h1>
            <div id="statusIndicator" class="flex items-center gap-2 text-xs bg-emerald-800 px-3 py-1 rounded-full">
                <span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span>
                متصل
            </div>
        </div>
    </header>

    <!-- شريط البحث -->
    <div class="container mx-auto p-4">
        <div class="relative max-w-xl mx-auto">
            <input type="text" id="searchInput" placeholder="بحث عن سورة..." 
                   class="w-full p-4 pr-12 rounded-xl border-none shadow-md focus:ring-2 focus:ring-emerald-500 transition-all">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-emerald-500"></i>
        </div>
    </div>

    <!-- قائمة السور -->
    <main class="container mx-auto p-4">
        <div id="surahContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <div class="col-span-full text-center py-20 text-emerald-600">
                <i class="fas fa-spinner fa-spin text-4xl"></i>
                <p class="mt-4">جاري تحميل قائمة السور...</p>
            </div>
        </div>
    </main>

    <!-- مشغل الصوت السفلي -->
    <div id="audioPlayerContainer" class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 shadow-[0_-4px_10px_rgba(0,0,0,0.05)] transform translate-y-full transition-transform duration-300 z-50">
        <div class="container mx-auto flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center gap-4 w-full md:w-1/3">
                <div class="bg-emerald-100 p-3 rounded-full text-emerald-700">
                    <i class="fas fa-music"></i>
                </div>
                <div>
                    <h3 id="currentSurahName" class="font-bold text-gray-800">اسم السورة</h3>
                    <p class="text-xs text-gray-500">القارئ: مشاري العفاسي</p>
                </div>
            </div>
            
            <audio id="mainAudio" controls class="w-full md:w-2/3 h-10 accent-emerald-600">
                <source src="" type="audio/mpeg">
            </audio>

            <button onclick="closePlayer()" class="text-gray-400 hover:text-red-500 p-2">
                <i class="fas fa-times"></i>
            </button>
        </div>
    </div>

    <!-- رسالة التنبيه -->
    <div id="copyNotice" class="fixed top-5 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-2 rounded-full shadow-xl opacity-0 transition-opacity pointer-events-none z-[100]">
        عذراً، النسخ غير مسموح في هذا التطبيق
    </div>

    <script>
        const surahContainer = document.getElementById('surahContainer');
        const searchInput = document.getElementById('searchInput');
        const audioPlayerContainer = document.getElementById('audioPlayerContainer');
        const mainAudio = document.getElementById('mainAudio');
        const currentSurahNameDisplay = document.getElementById('currentSurahName');
        const copyNotice = document.getElementById('copyNotice');
        const offlineOverlay = document.getElementById('offlineOverlay');
        const statusIndicator = document.getElementById('statusIndicator');

        let allSurahs = [];

        // التحقق من حالة الإنترنت بشكل دوري
        function updateOnlineStatus() {
            if (navigator.onLine) {
                offlineOverlay.classList.add('hidden');
                statusIndicator.innerHTML = '<span class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></span> متصل';
            } else {
                offlineOverlay.classList.remove('hidden');
                statusIndicator.innerHTML = '<span class="w-2 h-2 bg-red-400 rounded-full"></span> غير متصل';
            }
        }

        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);

        async function fetchSurahs() {
            if (!navigator.onLine) {
                updateOnlineStatus();
                return;
            }
            try {
                const response = await fetch('https://api.alquran.cloud/v1/surah');
                const data = await response.json();
                allSurahs = data.data;
                displaySurahs(allSurahs);
            } catch (error) {
                surahContainer.innerHTML = `<p class="col-span-full text-center text-red-500">فشل الاتصال بالخادم. تأكد من الإنترنت.</p>`;
            }
        }

        function displaySurahs(surahs) {
            surahContainer.innerHTML = '';
            surahs.forEach(surah => {
                const card = document.createElement('div');
                card.className = 'bg-white p-5 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow flex items-center justify-between group';
                card.innerHTML = `
                    <div class="flex items-center gap-4">
                        <span class="w-10 h-10 bg-emerald-50 text-emerald-700 flex items-center justify-center rounded-full font-bold text-sm">
                            ${surah.number}
                        </span>
                        <div>
                            <h2 class="font-bold text-gray-800 group-hover:text-emerald-700 transition-colors">${surah.name}</h2>
                            <p class="text-xs text-gray-500">${surah.englishName} • ${surah.numberOfAyahs} آية</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="playSurah(${surah.number}, '${surah.name}')" 
                                class="p-2 text-emerald-600 hover:bg-emerald-50 rounded-lg transition-colors">
                            <i class="fas fa-play-circle text-2xl"></i>
                        </button>
                        <button onclick="downloadSurah(${surah.number}, '${surah.name}')" 
                                class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg transition-colors">
                            <i class="fas fa-download text-xl"></i>
                        </button>
                    </div>
                `;
                surahContainer.appendChild(card);
            });
        }

        function playSurah(id, name) {
            if (!navigator.onLine) {
                showNotice("تحتاج إلى اتصال بالإنترنت للتشغيل");
                return;
            }
            const audioUrl = `https://server8.mp3quran.net/afs/${id.toString().padStart(3, '0')}.mp3`;
            mainAudio.src = audioUrl;
            currentSurahNameDisplay.innerText = name;
            audioPlayerContainer.classList.remove('translate-y-full');
            mainAudio.play();
        }

        async function downloadSurah(id, name) {
            if (!navigator.onLine) {
                showNotice("تحتاج إلى اتصال بالإنترنت للتحميل");
                return;
            }
            const audioUrl = `https://server8.mp3quran.net/afs/${id.toString().padStart(3, '0')}.mp3`;
            try {
                const response = await fetch(audioUrl);
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `سورة_${name}.mp3`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            } catch (e) {
                showNotice("فشل التحميل");
            }
        }

        function closePlayer() {
            mainAudio.pause();
            audioPlayerContainer.classList.add('translate-y-full');
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allSurahs.filter(s => s.name.includes(term) || s.englishName.toLowerCase().includes(term));
            displaySurahs(filtered);
        });

        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (e.key === 'c' || e.key === 'u' || e.key === 's' || e.key === 'a') || e.key === 'F12') {
                e.preventDefault();
                showNotice("النسخ غير مسموح");
            }
        });

        function showNotice(msg) {
            copyNotice.innerText = msg;
            copyNotice.style.opacity = '1';
            setTimeout(() => { copyNotice.style.opacity = '0'; }, 2000);
        }

        window.onload = () => {
            updateOnlineStatus();
            fetchSurahs();
        };
    </script>
</body>
</html>
