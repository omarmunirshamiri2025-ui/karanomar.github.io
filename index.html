<style>
  :root {
    --gold: #d4a843;
    --gold-light: #f0cb6e;
    --gold-dim: rgba(212,168,67,0.15);
    --green-deep: #0a1f14;
    --green-dark: #0f2a1a;
    --green-mid: #1a4a2a;
    --cream: #fdf3dc;
    --cream-soft: #e8d9b0;
    --text-muted: rgba(253,243,220,0.45);
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
  body{font-family:'Cairo',sans-serif;background:var(--green-deep);color:var(--cream);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}

  /* BG gradients */
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(212,168,67,0.12) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 100% 50%,rgba(45,122,74,0.08) 0%,transparent 50%);pointer-events:none;z-index:0}
  body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23d4a843' stroke-opacity='0.04' stroke-width='0.5'%3E%3Cpolygon points='40,4 76,22 76,58 40,76 4,58 4,22'/%3E%3Cpolygon points='40,16 64,28 64,52 40,64 16,52 16,28'/%3E%3C/g%3E%3C/svg%3E");pointer-events:none;z-index:0}

  /* ── PETALS CANVAS ── */
  #petalsCanvas{position:fixed;inset:0;pointer-events:none;z-index:2}

  .page-wrap{position:relative;z-index:3}

  /* ── HEADER ── */
  .header{text-align:center;padding:clamp(32px,8vw,56px) 16px clamp(20px,5vw,36px);position:relative}
  .header-glow{position:absolute;top:0;left:50%;transform:translateX(-50%);width:min(600px,100%);height:200px;background:radial-gradient(ellipse,rgba(212,168,67,0.15) 0%,transparent 70%);pointer-events:none}
  .bismillah{font-family:'Amiri Quran',serif;font-size:clamp(1.6rem,6vw,3.2rem);color:var(--gold);line-height:1.7;margin-bottom:12px;animation:shimmer 4s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(212,168,67,0.5))}
  @keyframes shimmer{0%,100%{filter:drop-shadow(0 0 15px rgba(212,168,67,0.4))}50%{filter:drop-shadow(0 0 35px rgba(212,168,67,0.8))}}
  .site-title{font-size:clamp(1.1rem,5vw,1.9rem);font-weight:700;letter-spacing:4px;color:var(--cream);margin-bottom:4px}
  .site-sub{font-size:clamp(0.72rem,2.5vw,0.82rem);color:var(--text-muted);letter-spacing:2px}
  .divider{display:flex;align-items:center;justify-content:center;gap:12px;margin:14px auto;max-width:300px}
  .div-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
  .div-star{color:var(--gold);font-size:0.9rem}

  /* ── SEARCH ── */
  .search-section{padding:0 14px 18px}
  .search-wrap{position:relative;max-width:540px;margin:0 auto}
  .search-icon-wrap{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:1rem;pointer-events:none;z-index:2}
  #searchInput{width:100%;padding:14px 46px 14px 16px;background:rgba(255,255,255,0.05);border:1.5px solid rgba(212,168,67,0.25);border-radius:60px;color:var(--cream);font-family:'Cairo',sans-serif;font-size:clamp(0.9rem,4vw,1rem);outline:none;transition:all 0.35s;backdrop-filter:blur(12px);text-align:right;-webkit-appearance:none}
  #searchInput::placeholder{color:var(--text-muted)}
  #searchInput:focus{border-color:rgba(212,168,67,0.7);background:rgba(255,255,255,0.07);box-shadow:0 0 0 3px rgba(212,168,67,0.1)}

  /* ── SUGGESTIONS ── */
  .suggestions-box{display:none;position:absolute;top:calc(100% + 8px);left:0;right:0;background:rgba(12,28,18,0.98);border:1.5px solid rgba(212,168,67,0.2);border-radius:16px;overflow:hidden;z-index:200;backdrop-filter:blur(24px);box-shadow:0 20px 60px rgba(0,0,0,0.6);max-height:260px;overflow-y:auto}
  .suggestions-box.open{display:block;animation:dropIn 0.2s ease}
  @keyframes dropIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  .sug-item{display:flex;align-items:center;gap:12px;padding:11px 16px;cursor:pointer;transition:background 0.15s;border-bottom:1px solid rgba(212,168,67,0.07)}
  .sug-item:last-child{border-bottom:none}
  .sug-item:active{background:rgba(212,168,67,0.12)}
  .sug-badge{width:28px;height:28px;min-width:28px;border-radius:50%;background:var(--gold-dim);border:1px solid rgba(212,168,67,0.3);display:flex;align-items:center;justify-content:center;font-size:0.68rem;color:var(--gold);font-weight:700}
  .sug-name{font-size:0.9rem;color:var(--cream)}
  .sug-type{font-size:0.7rem;color:var(--text-muted)}

  /* ── CONTROLS ── */
  .controls-bar{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:10px;padding:0 14px 22px;max-width:600px;margin:0 auto}
  .styled-select{position:relative;width:100%;max-width:360px}
  .styled-select::after{content:'▾';position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:0.85rem;pointer-events:none}
  select{width:100%;appearance:none;-webkit-appearance:none;background:rgba(255,255,255,0.05);border:1.5px solid rgba(212,168,67,0.25);border-radius:40px;color:var(--cream);font-family:'Cairo',sans-serif;font-size:clamp(0.82rem,3.5vw,0.9rem);padding:12px 16px 12px 38px;cursor:pointer;outline:none;transition:all 0.3s}
  select option{background:#0f2a1a;color:var(--cream)}

  /* ── SECTION LABEL ── */
  .section-label{text-align:center;font-size:0.72rem;color:var(--text-muted);letter-spacing:2px;margin-bottom:16px;padding:0 14px}

  /* ── GRID ── */
  .grid-wrap{padding:0 12px 20px;max-width:1200px;margin:0 auto}
  .surah-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,240px),1fr));gap:10px}

  @media(max-width:480px){
    .surah-grid{grid-template-columns:1fr 1fr}
  }
  @media(max-width:320px){
    .surah-grid{grid-template-columns:1fr}
  }

  .surah-card{background:rgba(255,255,255,0.03);border:1px solid rgba(212,168,67,0.12);border-radius:14px;padding:13px 14px;cursor:pointer;transition:all 0.25s;display:flex;align-items:center;gap:11px;position:relative;overflow:hidden;animation:cardIn 0.4s ease both;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  @keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .surah-card:active{transform:scale(0.97);background:rgba(212,168,67,0.06)}
  @media(hover:hover){
    .surah-card:hover{border-color:rgba(212,168,67,0.45);transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,0.4)}
  }
  .card-num{width:40px;height:40px;min-width:40px;border-radius:50%;background:linear-gradient(135deg,var(--green-mid),var(--green-dark));border:1.5px solid rgba(212,168,67,0.3);display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:700;color:var(--gold-light);flex-shrink:0}
  .card-body{flex:1;min-width:0}
  .card-name{font-family:'Amiri',serif;font-size:clamp(0.95rem,3.5vw,1.1rem);color:var(--cream);line-height:1.3;margin-bottom:2px}
  .card-meta{font-size:0.68rem;color:var(--text-muted)}
  .card-tag{font-size:0.65rem;color:var(--gold);background:var(--gold-dim);border:1px solid rgba(212,168,67,0.2);border-radius:20px;padding:2px 8px;white-space:nowrap;flex-shrink:0}

  /* ── MODAL OVERLAY ── */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;backdrop-filter:blur(10px);overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
  .overlay.open{display:flex;animation:fadeOverlay 0.25s ease}
  @keyframes fadeOverlay{from{opacity:0}to{opacity:1}}

  /* ── MODAL ── */
  .modal{background:linear-gradient(170deg,#0f2a1a 0%,#0a1f14 100%);border:1px solid rgba(212,168,67,0.2);width:100%;max-width:820px;margin:auto;box-shadow:0 40px 100px rgba(0,0,0,0.8);animation:modalIn 0.32s cubic-bezier(0.34,1.3,0.64,1);overflow:hidden;position:relative;align-self:flex-end}
  @media(min-width:540px){
    .modal{border-radius:24px;align-self:center;margin:20px auto}
  }
  @media(max-width:539px){
    .modal{border-radius:22px 22px 0 0;min-height:70vh}
  }
  @keyframes modalIn{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}

  /* Petal canvas inside modal */
  #modalPetalsCanvas{position:absolute;inset:0;pointer-events:none;z-index:0;border-radius:inherit}
  .modal-content-wrap{position:relative;z-index:1}

  /* Drag handle for mobile */
  .drag-handle{display:none;justify-content:center;padding:10px 0 4px}
  .drag-handle-bar{width:40px;height:4px;border-radius:4px;background:rgba(212,168,67,0.3)}
  @media(max-width:539px){.drag-handle{display:flex}}

  /* ── MODAL HEADER ── */
  .modal-head{padding:clamp(14px,4vw,22px) clamp(16px,4vw,28px) clamp(12px,3vw,18px);border-bottom:1px solid rgba(212,168,67,0.12);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .modal-surah-name{font-family:'Amiri',serif;font-size:clamp(1.5rem,6vw,2rem);color:var(--gold);line-height:1.2;margin-bottom:4px}
  .modal-meta{font-size:clamp(0.72rem,2.5vw,0.82rem);color:var(--text-muted)}
  .modal-meta span{color:var(--gold-light);font-weight:600}
  .head-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}

  /* ── BUTTONS ── */
  .btn{display:inline-flex;align-items:center;gap:6px;padding:clamp(8px,2.5vw,10px) clamp(14px,4vw,20px);border-radius:40px;border:none;cursor:pointer;font-family:'Cairo',sans-serif;font-size:clamp(0.78rem,3vw,0.85rem);font-weight:600;transition:all 0.2s;white-space:nowrap;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  .btn-primary{background:linear-gradient(135deg,var(--gold),#a07a20);color:#0a1a0a;box-shadow:0 4px 14px rgba(212,168,67,0.35)}
  .btn-primary:active{transform:scale(0.96)}
  .btn-close{width:34px;height:34px;padding:0;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:50%;color:var(--cream);font-size:0.95rem;display:flex;align-items:center;justify-content:center;cursor:pointer}
  .btn-close:active{background:rgba(220,60,60,0.25)}

  /* ── AUDIO ── */
  .audio-strip{padding:clamp(10px,3vw,14px) clamp(14px,4vw,28px);border-bottom:1px solid rgba(212,168,67,0.1);display:flex;align-items:center;gap:10px}
  .audio-label{font-size:0.75rem;color:var(--gold);white-space:nowrap;font-weight:600}
  audio{flex:1;min-width:0;height:36px;border-radius:20px}
