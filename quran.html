<style>
  :root {
    --gold: #d4a843;
    --gold-light: #f0cb6e;
    --gold-dim: rgba(212,168,67,0.15);
    --green-deep: #0a1f14;
    --green-dark: #0f2a1a;
    --green-mid: #1a4a2a;
    --cream: #fdf3dc;
    --cream-soft: #e8d9b0;
    --text-muted: rgba(253,243,220,0.45);
  }
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
  body{font-family:'Cairo',sans-serif;background:var(--green-deep);color:var(--cream);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}

  /* BG gradients */
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(212,168,67,0.12) 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 100% 50%,rgba(45,122,74,0.08) 0%,transparent 50%);pointer-events:none;z-index:0}
  body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23d4a843' stroke-opacity='0.04' stroke-width='0.5'%3E%3Cpolygon points='40,4 76,22 76,58 40,76 4,58 4,22'/%3E%3Cpolygon points='40,16 64,28 64,52 40,64 16,52 16,28'/%3E%3C/g%3E%3C/svg%3E");pointer-events:none;z-index:0}

  /* ── PETALS CANVAS ── */
  #petalsCanvas{position:fixed;inset:0;pointer-events:none;z-index:2}

  .page-wrap{position:relative;z-index:3}

  /* ── HEADER ── */
  .header{text-align:center;padding:clamp(32px,8vw,56px) 16px clamp(20px,5vw,36px);position:relative}
  .header-glow{position:absolute;top:0;left:50%;transform:translateX(-50%);width:min(600px,100%);height:200px;background:radial-gradient(ellipse,rgba(212,168,67,0.15) 0%,transparent 70%);pointer-events:none}
  .bismillah{font-family:'Amiri Quran',serif;font-size:clamp(1.6rem,6vw,3.2rem);color:var(--gold);line-height:1.7;margin-bottom:12px;animation:shimmer 4s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(212,168,67,0.5))}
  @keyframes shimmer{0%,100%{filter:drop-shadow(0 0 15px rgba(212,168,67,0.4))}50%{filter:drop-shadow(0 0 35px rgba(212,168,67,0.8))}}
  .site-title{font-size:clamp(1.1rem,5vw,1.9rem);font-weight:700;letter-spacing:4px;color:var(--cream);margin-bottom:4px}
  .site-sub{font-size:clamp(0.72rem,2.5vw,0.82rem);color:var(--text-muted);letter-spacing:2px}
  .divider{display:flex;align-items:center;justify-content:center;gap:12px;margin:14px auto;max-width:300px}
  .div-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
  .div-star{color:var(--gold);font-size:0.9rem}

  /* ── SEARCH ── */
  .search-section{padding:0 14px 18px}
  .search-wrap{position:relative;max-width:540px;margin:0 auto}
  .search-icon-wrap{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:1rem;pointer-events:none;z-index:2}
  #searchInput{width:100%;padding:14px 46px 14px 16px;background:rgba(255,255,255,0.05);border:1.5px solid rgba(212,168,67,0.25);border-radius:60px;color:var(--cream);font-family:'Cairo',sans-serif;font-size:clamp(0.9rem,4vw,1rem);outline:none;transition:all 0.35s;backdrop-filter:blur(12px);text-align:right;-webkit-appearance:none}
  #searchInput::placeholder{color:var(--text-muted)}
  #searchInput:focus{border-color:rgba(212,168,67,0.7);background:rgba(255,255,255,0.07);box-shadow:0 0 0 3px rgba(212,168,67,0.1)}

  /* ── SUGGESTIONS ── */
  .suggestions-box{display:none;position:absolute;top:calc(100% + 8px);left:0;right:0;background:rgba(12,28,18,0.98);border:1.5px solid rgba(212,168,67,0.2);border-radius:16px;overflow:hidden;z-index:200;backdrop-filter:blur(24px);box-shadow:0 20px 60px rgba(0,0,0,0.6);max-height:260px;overflow-y:auto}
  .suggestions-box.open{display:block;animation:dropIn 0.2s ease}
  @keyframes dropIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
  .sug-item{display:flex;align-items:center;gap:12px;padding:11px 16px;cursor:pointer;transition:background 0.15s;border-bottom:1px solid rgba(212,168,67,0.07)}
  .sug-item:last-child{border-bottom:none}
  .sug-item:active{background:rgba(212,168,67,0.12)}
  .sug-badge{width:28px;height:28px;min-width:28px;border-radius:50%;background:var(--gold-dim);border:1px solid rgba(212,168,67,0.3);display:flex;align-items:center;justify-content:center;font-size:0.68rem;color:var(--gold);font-weight:700}
  .sug-name{font-size:0.9rem;color:var(--cream)}
  .sug-type{font-size:0.7rem;color:var(--text-muted)}

  /* ── CONTROLS ── */
  .controls-bar{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:10px;padding:0 14px 22px;max-width:600px;margin:0 auto}
  .styled-select{position:relative;width:100%;max-width:360px}
  .styled-select::after{content:'▾';position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--gold);font-size:0.85rem;pointer-events:none}
  select{width:100%;appearance:none;-webkit-appearance:none;background:rgba(255,255,255,0.05);border:1.5px solid rgba(212,168,67,0.25);border-radius:40px;color:var(--cream);font-family:'Cairo',sans-serif;font-size:clamp(0.82rem,3.5vw,0.9rem);padding:12px 16px 12px 38px;cursor:pointer;outline:none;transition:all 0.3s}
  select option{background:#0f2a1a;color:var(--cream)}

<script>
/* ══════════════════════════════════════════
   PETAL SYSTEM
══════════════════════════════════════════ */
const PETAL_COLORS = [
  '#f4a7b9','#f9c8d4','#e8728a','#f7c5d0',
  '#ffb3c6','#ff8fab','#ffc8dd','#ffcad4',
  '#d4a843','#f0cb6e','#c9f0c0','#b5ead7',
  '#fce4a8','#ffe5b4','#ffd6a5','#fdffb6'
];

function randomBetween(a,b){return a+Math.random()*(b-a)}

class Petal {
  constructor(cw, ch, isModal=false) {
    this.cw=cw; this.ch=ch; this.isModal=isModal;
    this.reset(true);
  }
  reset(init=false) {
    this.x = randomBetween(0, this.cw);
    this.y = init ? randomBetween(-200, this.ch) : randomBetween(-60, -10);
    this.size = randomBetween(this.isModal?5:6, this.isModal?13:18);
    this.speed = randomBetween(this.isModal?0.6:0.5, this.isModal?1.8:2.2);
    this.wind = randomBetween(-0.6, 0.6);
    this.angle = randomBetween(0, Math.PI*2);
    this.rotSpeed = randomBetween(-0.04, 0.04);
    this.opacity = randomBetween(0.45, 0.9);
    this.color = PETAL_COLORS[Math.floor(Math.random()*PETAL_COLORS.length)];
    this.swing = randomBetween(0.5, 2.0);
    this.swingSpeed = randomBetween(0.01, 0.03);
    this.swingOffset = randomBetween(0, Math.PI*2);
    this.t = 0;
    // petal type: 0=rounded, 1=elongated, 2=rose
    this.type = Math.floor(Math.random()*3);
  }
  update() {
    this.t += this.swingSpeed;
    this.x += this.wind + Math.sin(this.t + this.swingOffset) * this.swing;
    this.y += this.speed;
    this.angle += this.rotSpeed;
    if(this.y > this.ch + 30 || this.x < -50 || this.x > this.cw+50) this.reset();
  }
  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.angle);
    ctx.globalAlpha = this.opacity;
    ctx.fillStyle = this.color;
    ctx.strokeStyle = this.color;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    if(this.type===0) {
      // Rounded petal
      const w=this.size, h=this.size*1.6;
      ctx.moveTo(0,-h/2);
      ctx.bezierCurveTo(w*0.8,-h*0.2, w*0.8,h*0.2, 0,h/2);
      ctx.bezierCurveTo(-w*0.8,h*0.2, -w*0.8,-h*0.2, 0,-h/2);
    } else if(this.type===1) {
      // Elongated thin petal
      const w=this.size*0.5, h=this.size*2;
      ctx.moveTo(0,-h/2);
      ctx.quadraticCurveTo(w, 0, 0, h/2);
      ctx.quadraticCurveTo(-w, 0, 0,-h/2);
    } else {
      // Rose/5-petal flower shape
      const r=this.size*0.6, petals=5;
      for(let i=0;i<petals;i++){
        const a=(i/petals)*Math.PI*2;
        const x=Math.cos(a)*r, y=Math.sin(a)*r;
        const a2=((i+0.5)/petals)*Math.PI*2;
        const cx=Math.cos(a2)*r*0.4, cy=Math.sin(a2)*r*0.4;
        if(i===0) ctx.moveTo(x,y);
        else ctx.quadraticCurveTo(cx,cy,x,y);
      }
      ctx.closePath();
    }
    ctx.fill();
    ctx.restore();
  }
}

/* Global canvas */
const canvas = document.getElementById('petalsCanvas');
const ctx = canvas.getContext('2d');
let globalPetals = [];

function resizeGlobal() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  globalPetals = Array.from({length:28}, ()=>new Petal(canvas.width, canvas.height));
}

function animateGlobal() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  globalPetals.forEach(p=>{p.update();p.draw(ctx);});
  requestAnimationFrame(animateGlobal);
}

resizeGlobal();
animateGlobal();
window.addEventListener('resize', resizeGlobal);

/* Modal canvas */
let modalPetals=[], modalCtx=null, modalAnimating=false;
const mCanvas = document.getElementById('modalPetalsCanvas');
mCanvas.style.cssText='position:absolute;inset:0;pointer-events:none;z-index:0;';
modalCtx = mCanvas.getContext('2d');

function startModalPetals(){
  const modal=document.getElementById('modal');
  mCanvas.width=modal.offsetWidth;
  mCanvas.height=modal.offsetHeight;
  modalPetals=Array.from({length:18},()=>new Petal(mCanvas.width,mCanvas.height,true));
  if(!modalAnimating){modalAnimating=true;animateModal();}
}
function stopModalPetals(){modalAnimating=false;}

function animateModal(){
  if(!modalAnimating) return;
  modalCtx.clearRect(0,0,mCanvas.width,mCanvas.height);
  modalPetals.forEach(p=>{p.update();p.draw(modalCtx);});
  requestAnimationFrame(animateModal);
}

/* ══════════════════════════════════════════

══════════════════════════════════════════ */
const SURAHS=[
  {n:1,ar:"الفاتحة",t:"مكية",v:7},{n:2,ar:"البقرة",t:"مدنية",v:286},{n:3,ar:"آل عمران",t:"مدنية",v:200},
  {n:4,ar:"النساء",t:"مدنية",v:176},{n:5,ar:"المائدة",t:"مدنية",v:120},{n:6,ar:"الأنعام",t:"مكية",v:165},
  {n:7,ar:"الأعراف",t:"مكية",v:206},{n:8,ar:"الأنفال",t:"مدنية",v:75},{n:9,ar:"التوبة",t:"مدنية",v:129},
  {n:10,ar:"يونس",t:"مكية",v:109},{n:11,ar:"هود",t:"مكية",v:123},{n:12,ar:"يوسف",t:"مكية",v:111},

let currentSurah=null, currentAudioUrl='';
let ayahTimings=[], trackingInterval=null, lastHighlighted=-1;
let cachedAyahs=null;

/* ══════════════════════════════════════════
   GRID
══════════════════════════════════════════ */
function renderGrid(list){
  const grid=document.getElementById('surahGrid');
  if(!list.length){grid.innerHTML='<div class="no-results">لا توجد نتائج 🔎</div>';return;}
  grid.innerHTML=list.map((s,i)=>`
    <div class="surah-card" onclick="openSurah(${s.n})" style="animation-delay:${i*0.015}s">
      <div class="card-num">${s.n}</div>
      <div class="card-body">
        <div class="card-name">سورة ${s.ar}</div>
        <div class="card-meta">${s.v} آية</div>
      </div>
      <div class="card-tag">${s.t}</div>
    </div>`).join('');
}
renderGrid(SURAHS);

/* ══════════════════════════════════════════
   SEARCH
══════════════════════════════════════════ */
const searchInput=document.getElementById('searchInput');
const sugBox=document.getElementById('suggestionsBox');

searchInput.addEventListener('input',()=>{
  const q=searchInput.value.trim();
  if(!q){sugBox.classList.remove('open');renderGrid(SURAHS);return;}
  const num=parseInt(q);
  const filtered=SURAHS.filter(s=>s.ar.includes(q)||(!isNaN(num)&&s.n===num));
  if(filtered.length){
    sugBox.innerHTML=filtered.slice(0,6).map(s=>`
      <div class="sug-item" onclick="selectSuggestion(${s.n})">
        <div class="sug-badge">${s.n}</div>
        <div><div class="sug-name">سورة ${s.ar}</div><div class="sug-type">${s.t} • ${s.v} آية</div></div>
      </div>`).join('');
    sugBox.classList.add('open');
  } else {sugBox.classList.remove('open');}
  renderGrid(filtered);
});

function selectSuggestion(n){
  const s=SURAHS.find(x=>x.n===n);
  searchInput.value='سورة '+s.ar;
  sugBox.classList.remove('open');
  renderGrid([s]);
  openSurah(n);
}

document.addEventListener('click',e=>{if(!e.target.closest('.search-wrap'))sugBox.classList.remove('open');});

/* ══════════════════════════════════════════
   AUDIO
══════════════════════════════════════════ */
function getAudioUrl(n,reciter){
  return `https://cdn.islamic.network/quran/audio-surah/128/${reciter}/${n}.mp3`;
}

function estimateTimings(ayahs,totalDuration){
  const lengths=ayahs.map(a=>a.text?a.text.length:20);
  const total=lengths.reduce((s,l)=>s+l,0);
  let cursor=0;
  return lengths.map(l=>{const dur=(l/total)*totalDuration;const t={start:cursor,end:cursor+dur};cursor+=dur;return t;});
}

/* ══════════════════════════════════════════
   TRACKING
══════════════════════════════════════════ */
function startTracking(){
  if(trackingInterval)clearInterval(trackingInterval);
  lastHighlighted=-1;
  const audio=document.getElementById('audioPlayer');
  function tick(){
    if(!ayahTimings.length)return;
    const t=audio.currentTime;
    let idx=-1;
    for(let i=0;i<ayahTimings.length;i++){
      if(t>=ayahTimings[i].start&&t<ayahTimings[i].end){idx=i;break;}
    }
    if(idx===-1&&t>=ayahTimings[ayahTimings.length-1].start)idx=ayahTimings.length-1;
    if(idx===lastHighlighted)return;
    lastHighlighted=idx;
    document.querySelectorAll('.aya-span.active,.aya-num.active').forEach(el=>el.classList.remove('active'));
    if(idx>=0){
      const span=document.getElementById('aya-s-'+(idx+1));
      const num=document.getElementById('aya-n-'+(idx+1));
      if(span)span.classList.add('active');
      if(num)num.classList.add('active');
      if(span)span.scrollIntoView({behavior:'smooth',block:'center'});
    }
  }
  trackingInterval=setInterval(tick,100);
  audio.addEventListener('ended',()=>{
    clearInterval(trackingInterval);
    document.querySelectorAll('.aya-span.active,.aya-num.active').forEach(el=>el.classList.remove('active'));
  },{once:true});
}

/* ══════════════════════════════════════════
   OPEN SURAH
══════════════════════════════════════════ */
async function openSurah(n){
  const s=SURAHS.find(x=>x.n===n);
  currentSurah=s;
  cachedAyahs=null;
  ayahTimings=[];
  lastHighlighted=-1;
  if(trackingInterval){clearInterval(trackingInterval);trackingInterval=null;}

  document.getElementById('modalName').textContent='سورة '+s.ar;
  document.getElementById('modalMeta').innerHTML=`<span>${s.t}</span> • <span>${s.v}</span> آية • رقم <span>${s.n}</span>`;

  const reciter=document.getElementById('reciterSelect').value;
  currentAudioUrl=getAudioUrl(s.n,reciter);
  const audio=document.getElementById('audioPlayer');
  audio.src=currentAudioUrl;

  document.getElementById('versesWrap').innerHTML='<div class="state-box"><div class="ring"></div><span>جارٍ التحميل…</span></div>';
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';

  // Start modal petals
  setTimeout(startModalPetals, 100);

  try{
    const res=await fetch(`https://api.alquran.cloud/v1/surah/${n}/ar.uthmani`);
    const data=await res.json();
    if(data.code!==200)throw new Error();
    cachedAyahs=data.data.ayahs;
    renderVerses(data.data,s);

    audio.addEventListener('loadedmetadata',function onMeta(){
      audio.removeEventListener('loadedmetadata',onMeta);
      ayahTimings=estimateTimings(cachedAyahs,audio.duration||180);
    });
    audio.addEventListener('play',function onPlay(){
      if(audio.duration&&!ayahTimings.length)ayahTimings=estimateTimings(cachedAyahs,audio.duration);
      startTracking();
    });
    audio.addEventListener('pause',()=>{if(trackingInterval){clearInterval(trackingInterval);trackingInterval=null;}});
  }catch{
    document.getElementById('versesWrap').innerHTML='<div class="state-box error-state">⚠️ تعذّر التحميل. تحقق من الاتصال.</div>';
  }
}

/* ══════════════════════════════════════════
   RENDER VERSES
══════════════════════════════════════════ */
function renderVerses(surahData,s){
  const showBasmala=s.n!==1&&s.n!==9;
  const basmala=showBasmala?`<div class="basmala-wrap"><div class="basmala-text">بِسۡمِ ٱللَّهِ ٱلرَّحۡمَٰنِ ٱلرَّحِيمِ</div></div>`:'';
  const verses=surahData.ayahs.map(a=>`<span class="aya-span" id="aya-s-${a.numberInSurah}">${a.text}</span><span class="aya-num" id="aya-n-${a.numberInSurah}">${a.numberInSurah}</span>`).join(' ');
  document.getElementById('versesWrap').innerHTML=basmala+`<div class="quran-text">${verses}</div>`;
}

/* ══════════════════════════════════════════
   CLOSE
══════════════════════════════════════════ */
function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
  document.getElementById('audioPlayer').pause();
  if(trackingInterval){clearInterval(trackingInterval);trackingInterval=null;}
  document.querySelectorAll('.aya-span.active,.aya-num.active').forEach(el=>el.classList.remove('active'));
  stopModalPetals();
}

document.getElementById('overlay').addEventListener('click',e=>{
  if(e.target===document.getElementById('overlay'))closeModal();
});

/* ══════════════════════════════════════════
   DOWNLOAD
══════════════════════════════════════════ */
function downloadSurah(){
  if(!currentSurah||!currentAudioUrl)return;
  const a=document.createElement('a');
  a.href=currentAudioUrl;
  a.download=`سورة_${currentSurah.ar}.mp3`;
  a.target='_blank';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

/* ══════════════════════════════════════════
   RECITER CHANGE
══════════════════════════════════════════ */
document.getElementById('reciterSelect').addEventListener('change',()=>{
  if(!currentSurah)return;
  const reciter=document.getElementById('reciterSelect').value;
  currentAudioUrl=getAudioUrl(currentSurah.n,reciter);
  const audio=document.getElementById('audioPlayer');
  const playing=!audio.paused;
  audio.src=currentAudioUrl;
  ayahTimings=[];lastHighlighted=-1;
  document.querySelectorAll('.aya-span.active,.aya-num.active').forEach(el=>el.classList.remove('active'));
  audio.addEventListener('loadedmetadata',function onMeta(){
    audio.removeEventListener('loadedmetadata',onMeta);
    if(cachedAyahs&&audio.duration)ayahTimings=estimateTimings(cachedAyahs,audio.duration);
  });
  if(playing)audio.play();
});

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

let touchStartY=0;
document.getElementById('modal').addEventListener('touchstart',e=>{touchStartY=e.touches[0].clientY;},{passive:true});
document.getElementById('modal').addEventListener('touchend',e=>{
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(dy>80)closeModal();
},{passive:true});
